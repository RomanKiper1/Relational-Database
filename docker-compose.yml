services:
  db:
    image: postgres:16

    environment:
      POSTGRES_USER: clinic_user

      POSTGRES_PASSWORD: clinic_123

      POSTGRES_DB: clinic_db

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data

      - ./sql:/docker-entrypoint-initdb.d

  adminer:
    image: adminer

    ports:
      - "8080:8080"

    depends_on:
      - db

volumes:
  pgdata:
